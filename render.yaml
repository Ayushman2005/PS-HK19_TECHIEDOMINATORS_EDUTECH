services:
  # Frontend Static Site
  - type: static
    name: neural-notes-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: neural-notes-backend
          property: host

  # Backend Web Service (FastAPI)
  - type: web
    name: neural-notes-backend
    env: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false # User will need to set this in Render UI
      - key: CORS_ORIGINS
        value: "*" # Or set to the frontend URL after deployment
      - key: CHROMA_STORE_PATH
        value: /opt/render/project/src/backend/chroma_store
